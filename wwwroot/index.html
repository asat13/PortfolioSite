<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap" />
    <link rel="stylesheet" href="bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="PortfolioSiteWasm.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <style>
            .app-loading {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                background: #0D0D1F;
                gap: 24px;
            }
            .app-loading-spinner {
                width: 48px;
                height: 48px;
                border-radius: 50%;
                border: 3px solid rgba(139, 92, 246, 0.15);
                border-top-color: #C084FC;
                animation: app-spin 0.8s linear infinite;
            }
            .app-loading-text {
                font-family: 'DM Sans', system-ui, sans-serif;
                font-size: 14px;
                color: #5E5578;
                letter-spacing: 1.5px;
                text-transform: uppercase;
            }
            @keyframes app-spin {
                to { transform: rotate(360deg); }
            }
        </style>
        <div class="app-loading">
            <div class="app-loading-spinner"></div>
            <span class="app-loading-text">Loading</span>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#x1F5D9;</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
